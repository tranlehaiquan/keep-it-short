name: Deploy

on:
  workflow_dispatch:

env:
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/keep-it-short:latest
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/keep-it-short-web:latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
          DEPLOY_ENV: ${{ secrets.DEPLOY_ENV }}
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          envs: GHCR_TOKEN,GHCR_USER,DEPLOY_ENV
          script: |
            set -euo pipefail
            IMAGE_API="${{ env.IMAGE_API }}"
            IMAGE_WEB="${{ env.IMAGE_WEB }}"

            if [ -n "${DEPLOY_ENV:-}" ]; then
              printf '%s\n' "$DEPLOY_ENV" > /home/ubuntu/.env
              chmod 600 /home/ubuntu/.env
            elif [ ! -f /home/ubuntu/.env ]; then
              echo "No env file found. Either:"
              echo "  - Add GitHub secret DEPLOY_ENV (full apps/api/.env for production), or"
              echo "  - Create /home/ubuntu/.env on the VPS before deploying."
              exit 1
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker network create app_network 2>/dev/null || true
            for c in postgres redis; do
              docker network connect app_network "$c" 2>/dev/null || true
            done

            # Free port 80 if host nginx is installed
            sudo systemctl stop nginx 2>/dev/null || true
            sudo systemctl disable nginx 2>/dev/null || true

            docker pull "$IMAGE_API"
            docker pull "$IMAGE_WEB"

            docker stop app 2>/dev/null || true
            docker rm app 2>/dev/null || true

            docker run --rm \
              --network app_network \
              --env-file /home/ubuntu/.env \
              "$IMAGE_API" \
              node dist/migrate.js

            # nginx.conf proxies to hostname "api"
            docker run -d \
              --name app \
              --hostname api \
              --network-alias api \
              --restart always \
              --network app_network \
              -p 3000:3000 \
              --env-file /home/ubuntu/.env \
              "$IMAGE_API"

            docker stop web 2>/dev/null || true
            docker rm web 2>/dev/null || true

            docker run -d \
              --name web \
              --restart always \
              --network app_network \
              -p 4000:4000 \
              "$IMAGE_WEB"
