name: Build image

on:
  workflow_dispatch:

env:
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/keep-it-short:latest
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/keep-it-short-web:latest

jobs:
  build:
    # Native arm64 — avoids QEMU "Illegal instruction" during pnpm install on amd64 runners
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.IMAGE_API }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.IMAGE_WEB }}
