services:
  db:
    image: postgres:16-alpine
    networks:
      - internal
    environment:
      POSTGRES_DB: keep-it-short
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d keep-it-short"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - internal
    command: redis-server --requirepass redis_secure_password
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secure_password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - internal
    ports:
      - "${APP_PORT:-4000}:4000"
    expose:
      - "${APP_PORT:-4000}"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@db:5432/keep-it-short
      REDIS_URL: redis://default:redis_secure_password@redis:6379
      REDIS_PASSWORD: redis_secure_password
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-xu2tFfmnYYEw}
      BETTER_AUTH_URL: ${DOMAIN:-http://localhost:4000}
      BETTER_AUTH_TRUSTED_ORIGINS: ${DOMAIN:-http://localhost:4000}
      BASE_URL: ${DOMAIN:-http://localhost:4000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-10}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  internal:

volumes:
  pgdata:
  redisdata:
