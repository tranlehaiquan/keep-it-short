# Dev (DB + Redis only):  docker compose up -d
# Full stack (API + web):   docker compose up -d --build
#
# After first start, run migrations from the host:
#   DATABASE_URL=postgres://postgres:postgres@localhost:5433/keep-it-short pnpm db:migrate

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keep-it-short
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    networks:
      - app-network
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d keep-it-short"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redis_secure_password
    networks:
      - app-network
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secure_password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - app-network
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@db:5432/keep-it-short
      REDIS_PASSWORD: redis_secure_password
      REDIS_URL: redis://:redis_secure_password@redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${DOMAIN:-http://localhost:3000}
      BETTER_AUTH_TRUSTED_ORIGINS: ${DOMAIN:-http://localhost:3000}
      BASE_URL: ${DOMAIN:-http://localhost:3000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-10}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:

networks:
  app-network:
    driver: bridge
