<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="link" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Chain link shape: two overlapping rounded rectangles rotated 45deg -->
  <!-- Left link -->
  <g transform="translate(16,16) rotate(-45)">
    <rect x="-9" y="-3.5" width="9" height="7" rx="3.5" fill="none" stroke="url(#link)" stroke-width="2.4"/>
    <!-- Right link -->
    <rect x="0" y="-3.5" width="9" height="7" rx="3.5" fill="none" stroke="url(#link)" stroke-width="2.4"/>
    <!-- Cover middle overlap to make chain look connected -->
    <rect x="-0.5" y="-2" width="1" height="4" fill="url(#bg)"/>
  </g>
</svg>